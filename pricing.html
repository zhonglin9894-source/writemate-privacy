<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing – WriteMate</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 860px; margin: 60px auto; padding: 0 24px; color: #333; text-align: center; }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    p.sub { color: #666; margin-bottom: 48px; }
    .plans { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
    .plan { border: 1px solid #e0e0e0; border-radius: 12px; padding: 32px 28px; width: 240px; text-align: left; }
    .plan.popular { border-color: #6c47ff; }
    .plan h2 { font-size: 1.1rem; margin: 0 0 8px; }
    .plan .price { font-size: 2rem; font-weight: 700; margin: 16px 0 4px; }
    .plan .price span { font-size: 1rem; font-weight: 400; color: #666; }
    .plan ul { padding-left: 18px; color: #555; font-size: 0.9rem; line-height: 1.8; }
    .badge { background: #6c47ff; color: #fff; font-size: 0.75rem; padding: 2px 10px; border-radius: 20px; margin-left: 8px; }
  </style>
</head>
<body>
  <h1>Simple, Transparent Pricing</h1>
  <p class="sub">Start writing like a native English speaker today.</p>

  <div class="plans">
    <div class="plan">
      <h2>Monthly</h2>
      <div class="price">$4.9 <span>/ month</span></div>
      <ul>
        <li>Unlimited rewrites</li>
        <li>AI translation</li>
        <li>Tone selector</li>
        <li>Chrome extension</li>
      </ul>
    </div>
    <div class="plan popular">
      <h2>Annual <span class="badge">Save 33%</span></h2>
      <div class="price">$39 <span>/ year</span></div>
      <ul>
        <li>Unlimited rewrites</li>
        <li>AI translation</li>
        <li>Tone selector</li>
        <li>Chrome extension</li>
      </ul>
    </div>
  </div>
</body>
</html>
